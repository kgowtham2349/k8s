apiVersion: apps/v1
kind: service
metadata:
 name: webapp-service
spec:
 type: ClusterIP      # This is the default type, which exposes the service on a cluster-internal IP
 selector:           # This should match the labels of the pods you want to expose  
  app: webapp        # Replace with your actual label selector
  tier: frontend     # Replace with your actual label selector
 ports:
  - port: 80          # The port that the service will expose
    targetPort: 8080  # Replace with the actual port your application is listening on


